<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate App Icons</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    a { display: block; margin: 1rem 0; font-size: 1.1rem; }
    canvas { border: 1px solid #ccc; margin: 0.5rem; }
  </style>
</head>
<body>
  <h2>Text Memorizer — Icon Generator</h2>
  <p>Click each link to download the icon, then save it into this <code>icons/</code> folder.</p>
  <script>
    function makeIcon(size) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#6366f1";
      ctx.fillRect(0, 0, size, size);

      ctx.fillStyle = "#ffffff";
      ctx.font = `bold ${Math.round(size * 0.38)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("TM", size / 2, size / 2);

      document.body.appendChild(canvas);

      const a = document.createElement("a");
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL("image/png");
      a.textContent = `Download icon-${size}.png`;
      document.body.appendChild(a);
    }

    makeIcon(192);
    makeIcon(512);
  </script>
</body>
</html>
